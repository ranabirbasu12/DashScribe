<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DashScribe Bar</title>
    <link rel="stylesheet" href="/static/bar.css">
</head>
<body>
    <div id="bar" class="bar idle">
        <div class="bar-idle pywebview-drag-region"></div>
        <div class="bar-recording">
            <button id="cancel-btn" class="bar-btn cancel-btn" aria-label="Cancel">
                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
            <canvas id="waveform" width="132" height="24"></canvas>
            <div id="bar-warning" class="bar-warning hidden"></div>
            <button id="stop-btn" class="bar-btn stop-btn" aria-label="Stop">
                <div class="stop-icon"></div>
            </button>
        </div>
        <div class="bar-processing">
            <div class="processing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="bar-error">
            <div class="error-flash"></div>
            <button id="retry-btn" class="bar-btn retry-btn" aria-label="Retry">
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
            </button>
        </div>
    </div>
    <div id="bar-toast" class="bar-toast hidden">
        <span class="bar-toast-dot"></span>
        <svg class="bar-toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span id="bar-toast-text"></span>
    </div>
    <div id="tooltip" class="tooltip hidden">Hold Right Option to dictate</div>
    <script src="/static/bar.js"></script>
</body>
</html>
